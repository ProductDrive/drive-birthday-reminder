<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-slate-100 px-4">

  <div class="w-full max-w-md">

    <div class="bg-white shadow-2xl rounded-2xl p-8 border border-gray-100 backdrop-blur-sm">

      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800 tracking-tight">
          {{ isLogin ? 'Welcome Back 👋' : 'Create Account 🚀' }}
        </h2>
        <p class="text-gray-500 mt-2 text-sm">
          {{ isLogin ? 'Login to continue' : 'Sign up to get started' }}
        </p>
      </div>

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Email
        </label>
        <input [(ngModel)]="email" type="email" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 
                 focus:ring-3 focus:ring-blue-300 focus:border-blue-600 focus:border-2
                 outline-none transition-all duration-200 
                 placeholder-gray-500" placeholder="Enter your email" />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-600 mb-2">
          Password
        </label>
        <input [(ngModel)]="password" type="password" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 
                 focus:ring-3 focus:ring-blue-300 focus:border-blue-600 focus:border-2
                 outline-none transition-all duration-200 
                 placeholder-gray-500" placeholder="Enter your password" />
      </div>

      <!-- Primary Button -->
      <button (click)="submit()" class="w-full py-3 rounded-xl font-semibold text-white 
               bg-blue-600 hover:bg-blue-700 
               focus:ring-3 focus:ring-blue-300
               active:scale-[0.98] 
               transition-all duration-200 shadow-lg hover:shadow-xl">
        {{ isLogin ? 'Login' : 'Sign Up' }}
      </button>

      <!-- Toggle -->
      <div class="mt-6 text-center">
        <button (click)="toggleMode()"
          class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline transition-colors">
          Switch to {{ isLogin ? 'Sign Up' : 'Login' }}
        </button>
      </div>

      <!-- Message -->
      <div *ngIf="message" class="mt-6" role="alert" aria-live="polite">
        <p class="text-sm text-center px-4 py-3 rounded-lg font-medium flex items-center justify-center gap-2" [ngClass]="{
            'bg-red-100 text-red-800 border-2 border-red-300': message.startsWith('Error') || message.includes('error') || message.startsWith('❌'),
            'bg-green-100 text-green-800 border-2 border-green-300': message.includes('success') || message.includes('Success') || message.startsWith('✅')
          }">
          <span class="font-bold" aria-hidden="true">{{ message.startsWith('Error') || message.includes('error') || message.startsWith('❌') ? '!' : '' }}</span>
          <span class="font-bold" aria-hidden="true" *ngIf="message.includes('success') || message.includes('Success') || message.startsWith('✅')">&#10003;</span>
          {{ message }}
        </p>
      </div>

    </div>

  </div>

</div>
