<app-celebrants-edit-modal
  *ngIf="showEditModal"
  [data]="editData!"
  [open]="showEditModal"
  (closeModal)="closeEditModal()"
  (save)="saveEditModal($event)">
</app-celebrants-edit-modal>
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-slate-100 px-6 py-12">

  <div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="mb-6">
      <div class="flex items-center space-x-2">
        <input class="copy-input flex-1" [value]="inviteLink" readonly placeholder="Invite link" />
        <button class="copy-btn" (click)="copyInviteLink()" title="Copy invite link">
          <span class="material-icons">content_copy</span>
        </button>
      </div>
      <span class="text-gray-400 text-lg">Share this link with your loved ones.</span>
    </div>
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-10">
      <h2 class="text-4xl font-bold text-gray-800 tracking-tight">
        Celebrants
        <span *ngIf="(celebrants$ | async) as celebrants" 
              class="inline-block align-middle ml-2 bg-blue-600 text-white text-sm font-bold rounded-full h-6 px-2 min-w-[24px] text-center leading-6 shadow-md">
          {{ celebrants.length > 99 ? '99+' : celebrants.length }}
        </span>
      </h2>
      <div>
        <button (click)="addCelebrant()" class="inline-flex items-center px-4 py-2 rounded-full
                 bg-transparent hover:bg-blue-50 border-2 border-blue-600 font-medium text-blue-600
                 hover:text-blue-700
                 focus:ring-3 focus:ring-blue-300
                 active:scale-95
                 transition-all duration-200">
          <mat-icon class="mr-2" aria-hidden="true">add</mat-icon>
          Add a celebrant
        </button>
      </div>
    </div>

    <!-- Celebrants Grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">

      <div *ngFor="let c of celebrants$ | async" class="bg-white rounded-2xl shadow-lg hover:shadow-2xl 
               transition-all duration-300 overflow-hidden 
               border border-gray-100 group">

        <!-- Image -->
        <div class="relative">
          <img
            [src]="c.pictureUrl || 'https://www.shutterstock.com/shutterstock/photos/2636458881/display_1500/stock-vector-avatar-man-icon-profile-placeholder-anonymous-user-male-grey-person-identity-icon-template-2636458881.jpg'"
            alt="{{ c.name }}"
            class="w-full h-56 object-cover group-hover:scale-105 transition-transform duration-300" />
          <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
          <button class="absolute right-2 rounded-full p-2 bg-white/80 hover:bg-white text-gray-700 hover:text-blue-600 transition-all duration-200 edit-btn border border-gray-200 flex items-center justify-center"
                  (click)="editCelebrant(c)" title="Edit celebrant">
            <span class="material-icons" aria-hidden="true">edit</span>
          </button>
        </div>

        <!-- Content -->
        <div class="p-6">

          <h3 class="text-xl font-semibold text-gray-800">
            {{ c.name }}
          </h3>

          <p class="text-gray-500 text-sm mt-1">
            🎂 Birthday: {{ formatBirthday(c.birthDay, c.birthMonth) }}
          </p>

          <!-- Action -->
          <button (click)="sendWishes(c)" class="mt-5 w-full py-2.5 rounded-xl font-medium text-white
                   bg-blue-600 hover:bg-blue-700
                   focus:ring-3 focus:ring-blue-300
                   active:scale-[0.98]
                   transition-all duration-200 shadow-md hover:shadow-lg flex items-center justify-center gap-2">
            <mat-icon aria-hidden="true" class="text-lg">mail</mat-icon>
            Send Wishes
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
