<div class="modal-backdrop" *ngIf="open" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>Edit Celebrant</h2>
    <form (ngSubmit)="onSave()" #editForm="ngForm">
      <label>Name</label>
      <input type="text" [(ngModel)]="localData.name" name="name" required />

      <div class="flex-row">
        <div>
          <label>Day</label>
          <input type="number" [(ngModel)]="localData.birthDay" name="birthDay" min="1" max="31" required />
        </div>
        <div>
          <label>Month</label>
          <input type="number" [(ngModel)]="localData.birthMonth" name="birthMonth" min="1" max="12" required />
        </div>
      </div>

      <label>Notification Type</label>
      <div class="notify-type-options">
        <label *ngFor="let type of notificationTypes">
          <input 
            type="checkbox" 
            [checked]="isNotificationTypeChecked(type)" 
            (change)="toggleNotificationType(type)" 
            [name]="'notif-' + type" />
          {{ type | titlecase }}
        </label>
      </div>

      <div *ngIf="isNotificationTypeChecked('whatsapp')" class="whatsapp-note">
        <p><strong>Note:</strong> WhatsApp notifications are not yet available. Your subscription has been saved and you'll be notified when this feature launches. <strong>Standard messaging rates may apply</strong> .</p>
      </div>

      <div class="notify-section">
        <div class="mb-2 font-medium">Notify Me:</div>
        <div class="notify-options">
          <label *ngFor="let option of notifyOptions">
            <input 
              type="checkbox" 
              [checked]="isNotifyTimeChecked(option.value)" 
              (change)="toggleNotifyTime(option.value)"
              [name]="'time-' + option.value" />
            {{ option.label }}
          </label>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" (click)="onClose()">Cancel</button>
        <button type="submit" [disabled]="!editForm.form.valid">Save</button>
      </div>
    </form>
  </div>
</div>
